name: GitHub Classroom Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  # --------------------------------------------------------------
  # structural — assignment-aware checks that run on EVERY push.
  # Blocks only on hard SQL parse errors. Missing artefacts and
  # warehouse FAILs are coaching warnings (exit 0) so that purely
  # textual sessions (e.g. S01) can commit freely.
  # --------------------------------------------------------------
  structural:
    name: Structural checks (session-aware)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0           # need history for git diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate data (idempotent; skipped if cached)
        run: |
          python scripts/datagen/gen_all.py \
            --team-seed $(python scripts/datagen/_compute_seed.py) || true

      - name: Build warehouse (best-effort; warehouse_checks degrade if absent)
        run: python src/run_pipeline.py || true

      - name: Run session-aware checks (push mode)
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: python src/run_session_checks.py --mode push
