name: GitHub Classroom Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  autograding:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate data (if the student has not committed it)
        run: python scripts/datagen/gen_all.py --team-seed $(python scripts/datagen/_compute_seed.py)

      - name: Load pipeline
        run: python src/run_pipeline.py

      - name: Run validation checks (canonical)
        run: python src/run_checks.py
